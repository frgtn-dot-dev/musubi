name: Quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_call:

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck, test, lint, docs, and migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm check

      - name: Verify generated migrations are committed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/musubi
          ENVIRONMENT: test
          BETTER_AUTH_URL: http://localhost:7531
        run: |
          pnpm db:generate
          if [ -n "$(git status --porcelain -- packages/db/drizzle)" ]; then
            git status --short -- packages/db/drizzle
            echo "::error::Database schema and committed Drizzle migrations differ"
            exit 1
          fi

  docker:
    name: Build API image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
