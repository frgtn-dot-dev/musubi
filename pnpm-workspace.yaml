packages:
  - "apps/*"
  - "packages/*"
catalog:
  expo: ~56.0.17
# Expo/React Native tooling assumes a flat node_modules (config plugins, Metro).
# pnpm's default isolated layout hides transitive deps like @expo/config-plugins.
nodeLinker: hoisted
# Every workspace declares the peers it actually uses. Disabling implicit peer
# installation keeps filtered production images from inheriting Expo through
# unrelated optional peer edges, and makes the lockfile settings explicit.
autoInstallPeers: false
allowBuilds:
  esbuild: false
  msgpackr-extract: true
  sharp: false
  unrs-resolver: false
overrides:
  esbuild@<=0.24.2: ">=0.25.0"
  postcss@<8.5.10: ">=8.5.10"
  # Security bumps for transitive docs (Astro) deps flagged by Dependabot.
  svgo@>=4.0.0 <4.0.2: ">=4.0.2"
  dompurify@<=3.4.11: ">=3.4.12"
  brace-expansion@<1.1.16: ">=1.1.16 <2"
minimumReleaseAgeExclude:
  # Expo is a trusted first-party publisher — exclude its packages from the
  # release-age gate by name (globs, not name@version, which never matched).
  - "@expo/*"
  - expo
  - "expo-*"
  - babel-preset-expo
