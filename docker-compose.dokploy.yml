services:
  api:
    # Prebuilt image from Docker Hub (published on each GitHub Release by
    # .github/workflows/docker-publish.yml). Pin MUSUBI_TAG to a version so the
    # API only updates when you bump it; `latest` tracks the newest release.
    # Migrations run on container start (see apps/api/Dockerfile CMD).
    image: frgtndev/musubi:${MUSUBI_TAG:-latest}
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "${API_SERVER_PORT:-7531}"
    networks:
      dokploy-network:
        aliases:
          - musubi-api
      default: {}
    # Do not scale this service horizontally. A second process sharing the same
    # DB is rejected by the API's singleton advisory lock.
    deploy:
      replicas: 1
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set your password inside .env}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  data:

networks:
  dokploy-network:
    external: true
